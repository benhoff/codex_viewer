services:
  viewer:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${CODEX_VIEWER_PORT:-8000}:8000"
    environment:
      CODEX_VIEWER_HOST: 0.0.0.0
      CODEX_VIEWER_PORT: 8000
      CODEX_VIEWER_SYNC_MODE: remote
      CODEX_VIEWER_SYNC_ON_START: 0
      CODEX_VIEWER_DATA_DIR: /app/data
      CODEX_VIEWER_DB: /app/data/codex_sessions.sqlite3
      CODEX_VIEWER_LOG_LEVEL: info
      CODEX_VIEWER_PAGE_SIZE: 24
      CODEX_VIEWER_REMOTE_TIMEOUT: 15
      CODEX_VIEWER_API_VERSION: ${CODEX_VIEWER_API_VERSION:-2}
      CODEX_VIEWER_APP_VERSION: ${CODEX_VIEWER_APP_VERSION:-0.1.0}
      CODEX_VIEWER_EXPECTED_AGENT_VERSION: ${CODEX_VIEWER_EXPECTED_AGENT_VERSION:-0.1.0}
      CODEX_VIEWER_MIN_AGENT_VERSION: ${CODEX_VIEWER_MIN_AGENT_VERSION:-0.1.0}
      CODEX_VIEWER_AUTH_MODE: ${CODEX_VIEWER_AUTH_MODE:-none}
      CODEX_VIEWER_SESSION_SECRET: ${CODEX_VIEWER_SESSION_SECRET:-}
      CODEX_VIEWER_AUTH_PROXY_USER_HEADER: ${CODEX_VIEWER_AUTH_PROXY_USER_HEADER:-X-Forwarded-User}
      CODEX_VIEWER_AUTH_PROXY_NAME_HEADER: ${CODEX_VIEWER_AUTH_PROXY_NAME_HEADER:-X-Forwarded-Name}
      CODEX_VIEWER_AUTH_PROXY_EMAIL_HEADER: ${CODEX_VIEWER_AUTH_PROXY_EMAIL_HEADER:-X-Forwarded-Email}
      CODEX_VIEWER_AUTH_PROXY_LOGIN_URL: ${CODEX_VIEWER_AUTH_PROXY_LOGIN_URL:-}
      CODEX_VIEWER_AUTH_PROXY_LOGOUT_URL: ${CODEX_VIEWER_AUTH_PROXY_LOGOUT_URL:-}
      CODEX_VIEWER_AUTH_COOKIE_SECURE: ${CODEX_VIEWER_AUTH_COOKIE_SECURE:-0}
    volumes:
      - viewer-data:/app/data

volumes:
  viewer-data:
